<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./resources/style.css">
        <script type="module">
            import { log, stringify, currentNetwork } from './resources/utils.js';

            import * as Turkium from '../../web/Turkium-rpc/Turkium.js';
            let { Resolver, RpcClient, Encoding } = Turkium;

            (async () => {
                await Turkium.default('../../web/Turkium-rpc/Turkium_bg.wasm');

                let networkId = currentNetwork();
                log(`Connecting to Turkium network...`);
                log(`Selected network is ${networkId}...`);
                
                const rpc = new RpcClient({
                    resolver : new Resolver(),
                    networkId,
                });

                await rpc.connect();
                log("Connected to", rpc.url);
                
                log("GetBlockDagInfo request...");
                const info = await rpc.getBlockDagInfo();
                log("GetBlockDagInfo response:", info);

                log("Disconnected...");
                await rpc.disconnect();
            })();

        </script>
    </head>
    <body></body>
</html>
